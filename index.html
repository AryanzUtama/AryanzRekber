<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekber Real-Time</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body{font-family:'Inter',sans-serif}
.glass{background:rgba(255,255,255,.97);backdrop-filter:blur(12px)}
.msg-me{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border-radius:18px 18px 4px 18px}
.msg-them{background:white;color:#334155;border:1px solid #e2e8f0;border-radius:18px 18px 18px 4px}
.msg-system{background:#f1f5f9;color:#64748b;font-size:12px;padding:6px 16px;border-radius:999px}
.slide-up{animation:slideUp .4s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
.chat-img{max-width:220px;max-height:280px;border-radius:12px;cursor:pointer;object-fit:cover}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column}
#lightbox img{max-width:90vw;max-height:80vh;border-radius:8px}
</style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen text-slate-800 flex items-center justify-center p-4">

<!-- PAGE 1: LANDING -->
<div id="pLanding" class="w-full max-w-md slide-up">
<div class="glass rounded-3xl shadow-2xl p-8 border border-white/20 text-center">
<div class="w-20 h-20 bg-emerald-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-xl"><i class="fas fa-shield-halved text-white text-3xl"></i></div>
<h1 class="text-3xl font-bold text-slate-800">Rekber Real-Time</h1>
<p class="text-slate-500 mt-2">Chat + Foto Real-Time</p>
<input type="text" id="inputName" placeholder="Nama Anda..." class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none text-center font-medium mt-6 mb-4">
<div class="grid gap-3">
<button id="btnSeller" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg"><i class="fas fa-store mr-2"></i>Saya Seller</button>
<button id="btnBuyer" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg"><i class="fas fa-shopping-cart mr-2"></i>Saya Buyer</button>
</div>
</div>
</div>

<!-- PAGE 2: SELLER CREATE -->
<div id="pSeller" class="w-full max-w-md hidden slide-up">
<div class="glass rounded-3xl shadow-2xl p-8 border border-white/20">
<button id="btnBack1" class="text-slate-400 hover:text-slate-600 mb-4 text-sm"><i class="fas fa-arrow-left mr-1"></i>Kembali</button>
<h2 class="text-xl font-bold text-slate-800 mb-4">Buat Room</h2>
<form id="formCreate">
<div class="space-y-3">
<div><label class="text-sm font-semibold text-slate-700">Kode (4 Digit)</label><input type="text" id="cCode" maxlength="4" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none text-center text-2xl font-bold tracking-[0.4em] mt-1" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)"><button type="button" id="btnRandom" class="text-xs text-emerald-600 mt-1 hover:underline"><i class="fas fa-random mr-1"></i>Random</button></div>
<div><label class="text-sm font-semibold text-slate-700">Barang</label><input type="text" id="cItem" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none mt-1"></div>
<div><label class="text-sm font-semibold text-slate-700">Harga (Rp)</label><input type="number" id="cPrice" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none mt-1"></div>
<button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg"><i class="fas fa-plus-circle mr-2"></i>Buat Room</button>
</div>
</form>
</div>
</div>

<!-- PAGE 3: BUYER JOIN -->
<div id="pBuyer" class="w-full max-w-md hidden slide-up">
<div class="glass rounded-3xl shadow-2xl p-8 border border-white/20">
<button id="btnBack2" class="text-slate-400 hover:text-slate-600 mb-4 text-sm"><i class="fas fa-arrow-left mr-1"></i>Kembali</button>
<h2 class="text-xl font-bold text-slate-800 mb-4">Gabung Room</h2>
<form id="formJoin">
<div class="space-y-3">
<div><label class="text-sm font-semibold text-slate-700">Kode Room</label><input type="text" id="jCode" maxlength="4" required class="w-full px-4 py-4 rounded-xl border border-slate-200 focus:border-blue-500 outline-none text-center text-3xl font-bold tracking-[0.5em] mt-1" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)"></div>
<button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg"><i class="fas fa-sign-in-alt mr-2"></i>Gabung</button>
</div>
</form>
</div>
</div>

<!-- PAGE 4: WAITING -->
<div id="pWait" class="w-full max-w-md hidden slide-up">
<div class="glass rounded-3xl shadow-2xl p-8 border border-white/20 text-center">
<h2 class="text-xl font-bold text-slate-800 mb-2">Room Dibuat!</h2>
<p class="text-slate-500 mb-6">Bagikan kode ke Buyer</p>
<div class="bg-slate-100 rounded-2xl p-6 mb-6 border-2 border-dashed border-slate-300">
<div class="text-xs text-slate-500 uppercase font-bold mb-1">Kode</div>
<div id="dCode" class="text-5xl font-black text-slate-800 tracking-[0.2em] font-mono">----</div>
</div>
<div class="bg-white rounded-xl p-4 border border-slate-200 mb-6 text-left">
<div class="flex justify-between mb-2"><span class="text-sm font-medium text-slate-600">Seller (Anda)</span><span class="text-emerald-600 text-sm font-bold"><i class="fas fa-check-circle mr-1"></i>Online</span></div>
<div class="w-full bg-slate-100 rounded-full h-2 mb-3"><div class="bg-emerald-500 h-2 rounded-full" style="width:50%"></div></div>
<div class="flex justify-between"><span class="text-sm font-medium text-slate-600">Buyer</span><span id="wStatus" class="text-slate-400 text-sm"><i class="fas fa-circle text-[8px] mr-1"></i>Menunggu...</span></div>
</div>
<button id="btnCancel" class="text-red-500 hover:text-red-600 text-sm font-bold"><i class="fas fa-trash-alt mr-1"></i>Batalkan</button>
</div>
</div>

<!-- PAGE 5: CHAT -->
<div id="pChat" class="w-full max-w-2xl hidden slide-up h-[92vh]">
<div class="glass rounded-3xl shadow-2xl border border-white/20 h-full flex flex-col overflow-hidden">
<div class="bg-white/90 border-b border-slate-100 p-4 flex items-center justify-between shrink-0">
<div class="flex items-center gap-3"><div class="w-12 h-12 rounded-full bg-gradient-to-br from-emerald-500 to-blue-600 flex items-center justify-center text-white shadow-lg"><i class="fas fa-shield-halved text-lg"></i></div><div><h3 class="font-bold text-slate-800 text-lg">Room #<span id="hCode"></span></h3><span id="hRole" class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-bold text-[10px] uppercase">Seller</span></div></div>
<button id="btnLeave" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all flex items-center justify-center"><i class="fas fa-sign-out-alt"></i></button>
</div>
<div id="msgs" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/40" style="scroll-behavior:smooth"></div>
<div class="bg-white border-t border-slate-100 p-4 shrink-0">
<form id="formChat" class="flex gap-2 items-center">
<input type="file" id="fIn" accept="image/*" class="hidden">
<button type="button" id="btnAttach" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-emerald-100 text-slate-500 hover:text-emerald-600 transition-all flex items-center justify-center shrink-0"><i class="fas fa-paperclip"></i></button>
<input type="text" id="mIn" placeholder="Ketik pesan..." class="flex-1 px-5 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none text-sm bg-slate-50">
<button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white w-12 h-12 rounded-xl shadow-lg transition-all flex items-center justify-center shrink-0"><i class="fas fa-paper-plane"></i></button>
</form>
</div>
</div>
</div>

<!-- PREVIEW MODAL -->
<div id="pModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-4 slide-up">
<h3 class="font-bold text-slate-800 mb-3">Kirim Foto</h3>
<img id="pImg" class="w-full rounded-xl mb-3 max-h-64 object-contain bg-slate-100">
<div class="flex gap-2"><button id="btnCloseP" class="flex-1 py-2 rounded-xl border border-slate-200 text-slate-600 text-sm font-bold hover:bg-slate-50">Batal</button><button id="btnUp" class="flex-1 py-2 rounded-xl bg-emerald-600 text-white text-sm font-bold hover:bg-emerald-700"><i class="fas fa-paper-plane mr-1"></i>Kirim</button></div>
</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'" style="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column">
<img id="lImg" src="" alt="Full view" style="max-width:90vw;max-height:80vh;border-radius:8px">
<p class="text-white/70 text-sm mt-4">Klik untuk tutup</p>
</div>

<script>
// ===== SUPABASE CONFIG =====
const SB_URL='https://nswpbkxvbadubviyteik.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zd3Bia3h2YmFkdWJ2aXl0ZWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTQ2NzAsImV4cCI6MjA5NDczMDY3MH0.C3KuTUpXOZ0PIqQtlrj9KeGHhH14wedRsF8aSAZ1K7E';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

// ===== STATE =====
let myName='',myRole='',roomCode='';
let myId='u'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
let ch1=null,ch2=null,sf=null;

// ===== HELPERS =====
function show(id){
  document.getElementById('pLanding').classList.add('hidden');
  document.getElementById('pSeller').classList.add('hidden');
  document.getElementById('pBuyer').classList.add('hidden');
  document.getElementById('pWait').classList.add('hidden');
  document.getElementById('pChat').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function genCode(){
  document.getElementById('cCode').value=Math.floor(1000+Math.random()*9000).toString();
}

function esc(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}

// ===== EVENT HANDLERS =====

// Seller button
function onSeller(){
  myName=document.getElementById('inputName').value.trim();
  if(!myName){alert('Isi nama dulu!');return}
  myRole='seller';
  show('pSeller');
  genCode();
}

// Buyer button
function onBuyer(){
  myName=document.getElementById('inputName').value.trim();
  if(!myName){alert('Isi nama dulu!');return}
  myRole='buyer';
  show('pBuyer');
}

// Back button
function onBack(){show('pLanding')}

// Create room (Seller)
async function onCreate(e){
  e.preventDefault();
  roomCode=document.getElementById('cCode').value.trim();
  const item=document.getElementById('cItem').value.trim();
  const price=parseInt(document.getElementById('cPrice').value);
  if(roomCode.length!==4){alert('Kode harus 4 digit!');return}
  try{
    // Check if room exists
    const{data:existing}=await sb.from('rooms').select('*').eq('code',roomCode);
    if(existing&&existing.length>0){alert('Kode sudah dipakai!');return}
    // Create room
    const{error}=await sb.from('rooms').insert({
      code:roomCode,
      seller_name:myName,
      seller_id:myId,
      escrow_status:'waiting_buyer',
      escrow_item:item,
      escrow_price:price
    });
    if(error)throw error;
    // Show waiting page
    document.getElementById('dCode').textContent=roomCode;
    show('pWait');
    // Listen for buyer
    ch1=sb.channel('wait_'+roomCode)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'rooms',filter:'code=eq.'+roomCode},(payload)=>{
        if(payload.new.buyer_id){
          goChat();
        }
      })
      .subscribe();
    // Check if buyer already joined
    const{data:room}=await sb.from('rooms').select('*').eq('code',roomCode).single();
    if(room&&room.buyer_id){
      goChat();
    }
  }catch(err){
    console.error('Create error:',err);
    alert('Gagal buat room: '+err.message);
  }
}

// Join room (Buyer)
async function onJoin(e){
  e.preventDefault();
  roomCode=document.getElementById('jCode').value.trim();
  if(roomCode.length!==4){alert('Kode harus 4 digit!');return}
  try{
    // Get room
    const{data:room,error}=await sb.from('rooms').select('*').eq('code',roomCode).single();
    if(error){
      console.error('Join error:',error);
      alert('Room tidak ditemukan! Pastikan kode benar.');
      return;
    }
    if(!room){
      alert('Room tidak ditemukan! Pastikan kode benar.');
      return;
    }
    if(room.buyer_id){
      alert('Room sudah penuh!');
      return;
    }
    // Update room with buyer
    const{error:updErr}=await sb.from('rooms').update({
      buyer_name:myName,
      buyer_id:myId,
      escrow_status:'negotiating'
    }).eq('code',roomCode);
    if(updErr)throw updErr;
    // Go to chat
    goChat();
  }catch(err){
    console.error('Join error:',err);
    alert('Gagal gabung: '+err.message);
  }
}

// Cancel room
async function onCancel(){
  if(!confirm('Yakin batalkan room?'))return;
  if(ch1)ch1.unsubscribe();
  try{
    await sb.from('rooms').delete().eq('code',roomCode);
  }catch(e){console.error(e)}
  show('pLanding');
}

// Leave chat
async function onLeave(){
  if(!confirm('Yakin keluar?'))return;
  if(ch1)ch1.unsubscribe();
  if(ch2)ch2.unsubscribe();
  show('pLanding');
  location.reload();
}

// Go to chat page
async function goChat(){
  if(ch1)ch1.unsubscribe();
  show('pChat');
  document.getElementById('hCode').textContent=roomCode;
  document.getElementById('hRole').textContent=myRole.toUpperCase();
  document.getElementById('hRole').className=myRole==='seller'
    ?'px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-bold text-[10px] uppercase'
    :'px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-bold text-[10px] uppercase';
  await loadMsgs();
  // Listen room updates
  ch1=sb.channel('room_'+roomCode)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'rooms',filter:'code=eq.'+roomCode},()=>{})
    .subscribe();
  // Listen new messages
  ch2=sb.channel('msg_'+roomCode)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room_code=eq.'+roomCode},(payload)=>{
      addMsg(payload.new);
    })
    .subscribe();
}

// Load messages
async function loadMsgs(){
  try{
    const{data:msgs,error}=await sb.from('messages').select('*').eq('room_code',roomCode).order('created_at',{ascending:true});
    if(error)throw error;
    const box=document.getElementById('msgs');
    box.innerHTML='';
    if(!msgs||msgs.length===0){
      box.innerHTML='<div class="text-center py-10 text-slate-400"><i class="fas fa-comments text-4xl mb-3 opacity-20"></i><p class="text-sm">Chat dimulai...</p></div>';
      return;
    }
    msgs.forEach(m=>addMsg(m));
  }catch(err){
    console.error('Load msgs error:',err);
  }
}

// Add message to UI
function addMsg(m){
  const box=document.getElementById('msgs');
  if(box.querySelector('.fa-comments'))box.innerHTML='';
  const t=new Date(m.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  if(m.type==='system'){
    box.innerHTML+='<div class="flex justify-center my-2"><span class="msg-system">'+esc(m.text)+'</span></div>';
  }else if(m.type==='image'){
    const isMe=m.sender_id===myId;
    box.innerHTML+='<div class="flex '+(isMe?'justify-end':'justify-start')+' mb-3"><div class="max-w-[80%] '+(isMe?'msg-me':'msg-them')+' px-3 py-2 shadow-sm"><div class="text-[10px] opacity-80 mb-1"><b>'+esc(m.sender_name)+'</b> <span class="'+(m.role==='seller'?'text-emerald-300':'text-blue-300')+'">('+m.role+')</span></div><img src="'+m.text+'" onclick="openL(this.src)" class="chat-img block" loading="lazy"><div class="text-[10px] opacity-60 mt-1 text-right">'+t+'</div></div></div>';
  }else{
    const isMe=m.sender_id===myId;
    box.innerHTML+='<div class="flex '+(isMe?'justify-end':'justify-start')+' mb-3"><div class="max-w-[80%] '+(isMe?'msg-me':'msg-them')+' px-4 py-2.5 shadow-sm"><div class="text-[10px] opacity-80 mb-0.5"><b>'+esc(m.sender_name)+'</b> <span class="'+(m.role==='seller'?'text-emerald-300':'text-blue-300')+'">('+m.role+')</span></div><div class="text-sm leading-relaxed">'+esc(m.text)+'</div><div class="text-[10px] opacity-60 mt-1 text-right">'+t+'</div></div></div>';
  }
  box.scrollTop=box.scrollHeight;
}

// Send text message
async function onSend(e){
  e.preventDefault();
  const inp=document.getElementById('mIn');
  const txt=inp.value.trim();
  if(!txt)return;
  try{
    const{error}=await sb.from('messages').insert({
      room_code:roomCode,
      text:txt,
      sender_id:myId,
      sender_name:myName,
      role:myRole,
      type:'chat'
    });
    if(error)throw error;
    inp.value='';
  }catch(err){
    console.error('Send error:',err);
    alert('Gagal kirim pesan: '+err.message);
  }
}

// Select file
function onFile(e){
  const f=e.target.files[0];
  if(!f)return;
  if(!f.type.startsWith('image/')){alert('Hanya gambar!');return}
  if(f.size>5*1024*1024){alert('Max 5MB!');return}
  sf=f;
  const rd=new FileReader();
  rd.onload=function(ev){
    document.getElementById('pImg').src=ev.target.result;
    document.getElementById('pModal').classList.remove('hidden');
    document.getElementById('pModal').classList.add('flex');
  };
  rd.readAsDataURL(f);
  e.target.value='';
}

// Close preview
function closeP(){
  document.getElementById('pModal').classList.add('hidden');
  document.getElementById('pModal').classList.remove('flex');
  sf=null;
}

// Upload image
async function upImg(){
  if(!sf||!roomCode)return;
  const btn=document.getElementById('btnUp');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin mr-1"></i>...';
  const fn=roomCode+'_'+Date.now()+'_'+sf.name.replace(/[^a-zA-Z0-9.]/g,'_');
  try{
    const{data,error}=await sb.storage.from('chat-images').upload(fn,sf,{cacheControl:'3600',upsert:false});
    if(error)throw error;
    const{data:u}=sb.storage.from('chat-images').getPublicUrl(fn);
    const{error:msgErr}=await sb.from('messages').insert({
      room_code:roomCode,
      text:u.publicUrl,
      sender_id:myId,
      sender_name:myName,
      role:myRole,
      type:'image'
    });
    if(msgErr)throw msgErr;
    closeP();
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-paper-plane mr-1"></i>Kirim';
  }catch(err){
    console.error('Upload error:',err);
    alert('Gagal upload: '+err.message);
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-paper-plane mr-1"></i>Kirim';
  }
}

// Open lightbox
function openL(src){
  document.getElementById('lImg').src=src;
  document.getElementById('lightbox').style.display='flex';
}

// ===== ATTACH EVENT LISTENERS =====
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('btnSeller').addEventListener('click',onSeller);
  document.getElementById('btnBuyer').addEventListener('click',onBuyer);
  document.getElementById('btnBack1').addEventListener('click',onBack);
  document.getElementById('btnBack2').addEventListener('click',onBack);
  document.getElementById('btnRandom').addEventListener('click',genCode);
  document.getElementById('formCreate').addEventListener('submit',onCreate);
  document.getElementById('formJoin').addEventListener('submit',onJoin);
  document.getElementById('btnCancel').addEventListener('click',onCancel);
  document.getElementById('btnLeave').addEventListener('click',onLeave);
  document.getElementById('formChat').addEventListener('submit',onSend);
  document.getElementById('fIn').addEventListener('change',onFile);
  document.getElementById('btnAttach').addEventListener('click',function(){document.getElementById('fIn').click()});
  document.getElementById('btnCloseP').addEventListener('click',closeP);
  document.getElementById('btnUp').addEventListener('click',upImg);
});
</script>
</body>
</html>
